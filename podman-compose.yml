version: '3.8'

services:
  # ============================================
  # SUPABASE STACK
  # ============================================

  db:
    image: supabase/postgres:15.6.1.143
    container_name: bankin-db
    ports:
      - '5432:5432'
    env_file:
      - .env.docker
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/supabase/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bankin-network

  gotrue:
    image: supabase/gotrue:v2.186.0
    container_name: bankin-auth
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '9999:9999'
    env_file:
      - .env.docker
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${API_EXTERNAL_URL}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@db:5432/postgres
      GOTRUE_SITE_URL: ${SITE_URL}
      GOTRUE_URI_ALLOW_LIST: '*'
      GOTRUE_DISABLE_SIGNUP: 'false'
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_ISSUER: ${API_EXTERNAL_URL}/auth/v1
      # RSA signing key for OIDC ID tokens (required for OAuth 2.1 server)
      GOTRUE_JWT_KEY_ID: ${GOTRUE_JWT_KEY_ID}
      GOTRUE_JWT_KEYS: ${GOTRUE_JWT_KEYS}
      GOTRUE_EXTERNAL_EMAIL_ENABLED: 'false'
      GOTRUE_MAILER_AUTOCONFIRM: 'true'
      # OAuth 2.1 Server (for MCP authentication)
      GOTRUE_OAUTH_SERVER_ENABLED: 'true'
      GOTRUE_OAUTH_SERVER_ALLOW_DYNAMIC_REGISTRATION: 'true'
      GOTRUE_OAUTH_SERVER_AUTHORIZATION_PATH: '/oauth/consent'
      # Google OAuth
      GOTRUE_EXTERNAL_GOOGLE_ENABLED: 'true'
      GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOTRUE_EXTERNAL_GOOGLE_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOTRUE_EXTERNAL_GOOGLE_REDIRECT_URI: http://localhost:${KONG_PORT:-54321}/auth/v1/callback
    networks:
      - bankin-network

  kong:
    image: kong:2.8.1
    container_name: bankin-kong
    depends_on:
      - gotrue
    ports:
      - '${KONG_PORT:-54321}:8000'
      - '8443:8443'
    env_file:
      - .env.docker
    environment:
      KONG_DATABASE: 'off'
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
    volumes:
      - ./docker/supabase/kong.yml:/var/lib/kong/kong.yml:ro
    networks:
      - bankin-network

  meta:
    image: supabase/postgres-meta:v0.83.2
    container_name: bankin-meta
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '8080:8080'
    env_file:
      - .env.docker
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: db
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: postgres
      PG_META_DB_USER: postgres
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - bankin-network

  studio:
    image: supabase/studio:20240729-ce42139
    container_name: bankin-studio
    depends_on:
      - kong
      - meta
    ports:
      - '${STUDIO_PORT:-54321}:3000'
    env_file:
      - .env.docker
    environment:
      STUDIO_PG_META_URL: http://meta:8080
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DEFAULT_ORGANIZATION_NAME: Bankin Analyzer
      DEFAULT_PROJECT_NAME: Local Development
      SUPABASE_URL: http://kong:8000
      SUPABASE_PUBLIC_URL: http://localhost:${KONG_PORT:-54321}
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
    networks:
      - bankin-network

  # ============================================
  # APPLICATION
  # ============================================

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: bankin-backend
    depends_on:
      db:
        condition: service_healthy
      gotrue:
        condition: service_started
    ports:
      - '${BACKEND_PORT:-3001}:3000'
    env_file:
      - .env.docker
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/postgres
      DIRECT_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/postgres
      SUPABASE_URL: http://kong:8000
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      FRONTEND_URL: ${FRONTEND_URL}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    networks:
      - bankin-network

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    container_name: bankin-frontend
    depends_on:
      - backend
    ports:
      - '${FRONTEND_PORT:-5173}:80'
    networks:
      - bankin-network

volumes:
  postgres_data:

networks:
  bankin-network:
    driver: bridge
